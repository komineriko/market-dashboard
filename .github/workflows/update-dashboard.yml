name: Update market dashboard

on:
  schedule:
    # 平日 05:50 JST = 前日 20:50 UTC（UTCの日曜〜木曜 = JSTの月曜〜金曜）
    - cron: "50 20 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch data and update dashboard
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python update_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "market-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "chore: 自動更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "変更なし。コミットをスキップします。"
          fi
